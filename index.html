<body>

  
<pre id="elm"></pre>
<script src="out/elm.js"></script>
<script>
  var app = Elm.Main.init({ node: document.getElementById("elm") });
  
  app.ports.render.subscribe( () => f() )

  document.addEventListener("DOMContentLoaded", () => f() );

  async function f() {
    await new Promise(r => setTimeout(r, 1));
    hljs.highlightAll();
    renderMathInElement(document.body, {
      delimiters: [
        {
          left: "$$",
          right: "$$", 
          display: true
        },
        {
          left: "$", 
          right: "$", 
          display: false
        }],
      macros: {
          "\\ideal" : "\\left\\langle\\,#1\\,\\right\\rangle" ,
          "\\deg" : "\\text{deg}\\left(#1\\right)" ,
          "\\set" : "\\left\\{ \\, #1 \\, \\right\\}" ,
          "\\hl" : "\\colorbox{pink}{$#1$}" ,
          "\\hll" : "\\colorbox{lightgreen}{$#1$}" ,
          "\\F" : "\\mathbb{F}" ,
          "\\Z" : "\\mathbb{Z}" ,
          "\\leq" : "\\leqslant" ,
          "\\geq" : "\\geqslant" ,
          "\\defeq" : "\\overset{\\scriptsize\\textnormal{def}}{=}" ,
          "\\qeq" : "\\overset{\\scriptsize\\textnormal{?}}{=}"
      }
      });
  }

</script>
</body>
